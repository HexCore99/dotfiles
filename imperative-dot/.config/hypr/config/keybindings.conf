# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  ◈ KEYBINDINGS (AUTOGENERATED)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# bind   = normal keybind; runs once when the key combo is pressed
# binde  = repeat keybind; keeps running while the key combo is held
# bindl  = locked keybind; works even when input/session is locked or inhibited
# bindls = locked + exact keysym bind; useful for separating Alt_L/Alt_R or Shift_L/Shift_R
# bindm  = mouse bind; used for mouse drag actions like move/resize window

# ───────── Static Core Binds ─────────
gesture = 3, horizontal, workspace
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# ───────── Dynamic Settings Binds ─────────
bind = ALT, Q, exec, hyprctl dispatch killactive
bindls = ALT_R, F, exec, hyprctl dispatch togglefloating
binde = $mainMod SHIFT_L, left, resizeactive, -50 0
binde = $mainMod SHIFT_L, right, resizeactive, 50 0
binde = $mainMod SHIFT_L, up, resizeactive, 0 -50
binde = $mainMod SHIFT_L, down, resizeactive, 0 50

bind = $mainMod CTRL, left, movewindow, l
bind = $mainMod CTRL, right, movewindow, r
bind = $mainMod CTRL, up, movewindow, u
bind = $mainMod CTRL, down, movewindow, d

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d


bindels = ALT_L, T, exec, kitty
bindls = ALT_L, Z, exec, firefox
bindls = ALT_L, E, exec, nautilus
bindls = ALT_L, V, exec, ~/.config/hypr/scripts/qs_manager.sh toggle clipboard
bindls = ALT_L, SPACE, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle applauncher
bindls = ALT_R, V, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle volume
bindls = ALT_R, M, exec, ~/.config/hypr/scripts/qs_manager.sh toggle movies
bindls = ALT_R, S, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle settings
bindls = ALT_R, Q, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle music
bindls = ALT_R, B, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle battery
bindls = ALT_R, N, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle network
bindls = ALT_R, T, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle focustime
bindls = ALT_R, H, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle guide
bind = $mainMod, R, exec, bash ~/.config/hypr/scripts/reload.sh

bindl = , Caps_Lock, exec, sleep 0.1 && swayosd-client --caps-lock
bindl = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower
bindl = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise


## Screenshots
bindl = , Print, exec, ~/.config/hypr/scripts/screenshot.sh
bind = $mainMod, grave, exec, ~/.config/hypr/scripts/screenshot.sh --edit
bindl = $mainMod, Print, exec, ~/.config/hypr/scripts/screenshot.sh --full
bindl = $mainMod SHIFT_L, Print, exec, ~/.config/hypr/scripts/screenshot.sh --full --edit

# Screenshots with grimblast
bindls = ALT_L,grave, exec, grimblast --notify copy area
# Select area first, then edit in Satty

# Area screenshot -> file
#bindl = SHIFT_L, Print, exec, grimblast --notify save area
# Full screen -> clipboard
#bindl = $mainMod, Print, exec, grimblast --notify copy screen
# Full screen -> file
#bindl = $mainMod SHIFT_L, Print, exec, grimblast --notify save screen

bindl = , XF86PowerOff, exec, bash ~/.config/hypr/scripts/lock.sh
bindel = $mainMod, L, exec, bash ~/.config/hypr/scripts/lock.sh
bindl = $mainMod, SPACE, exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , xf86AudioMicMute, exec, swayosd-client --input-volume mute-toggle
bindl = , xf86audiomute, exec, swayosd-client --output-volume mute-toggle
bindel = , xf86audiolowervolume, exec, swayosd-client --output-volume lower
bindel = , xf86audioraisevolume, exec, swayosd-client --output-volume raise

## workspace Bindings
bindls = ALT_L, 1, exec, ~/.config/hypr/scripts/qs_manager.sh 1
bindls = ALT_L, 2, exec, ~/.config/hypr/scripts/qs_manager.sh 2
bindls = ALT_L, 3, exec, ~/.config/hypr/scripts/qs_manager.sh 3
bindls = ALT_L, 4, exec, ~/.config/hypr/scripts/qs_manager.sh 4
bindls = ALT_L, 5, exec, ~/.config/hypr/scripts/qs_manager.sh 5
bindls = ALT_L, 6, exec, ~/.config/hypr/scripts/qs_manager.sh 6
bindls = ALT_L, 7, exec, ~/.config/hypr/scripts/qs_manager.sh 7
bindls = ALT_L, 8, exec, ~/.config/hypr/scripts/qs_manager.sh 8
bindls = ALT_L, 9, exec, ~/.config/hypr/scripts/qs_manager.sh 9
bindls = ALT_L, 0, exec, ~/.config/hypr/scripts/qs_manager.sh 10

# Alt+Tab: switch windows in current workspace
bindls = ALT_L, TAB, cyclenext
bindls = ALT_L, TAB, alterzorder, top

# Alt+Shift+Tab: switch backwards
bindls = ALT_L SHIFT, TAB, cyclenext, prev
bindls = ALT_L SHIFT, TAB, alterzorder, top

bindls = ALT_R, 1, exec, ~/.config/hypr/scripts/qs_manager.sh 1 move
bindls = ALT_R, 2, exec, ~/.config/hypr/scripts/qs_manager.sh 2 move
bindls = ALT_R, 3, exec, ~/.config/hypr/scripts/qs_manager.sh 3 move
bindls = ALT_R, 4, exec, ~/.config/hypr/scripts/qs_manager.sh 4 move
bindls = ALT_R, 5, exec, ~/.config/hypr/scripts/qs_manager.sh 5 move
bindls = ALT_R, 6, exec, ~/.config/hypr/scripts/qs_manager.sh 6 move
bindls = ALT_R, 7, exec, ~/.config/hypr/scripts/qs_manager.sh 7 move
bindls = ALT_R, 8, exec, ~/.config/hypr/scripts/qs_manager.sh 8 move
bindls = ALT_R, 9, exec, ~/.config/hypr/scripts/qs_manager.sh 9 move
bindls = ALT_R, 0, exec, ~/.config/hypr/scripts/qs_manager.sh 10 move
bindls = ALT_R, TAB, exec, ~/.config/hypr/scripts/focus_next_monitor.sh
